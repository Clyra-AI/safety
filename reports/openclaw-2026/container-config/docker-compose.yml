version: "3.9"
services:
  openclaw-ungoverned:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../..:/workspace:ro
      - ../../../runs:/workspace/runs
    working_dir: /workspace
    command: ["bash", "-lc", "echo 'Populate ungoverned lane command in pipelines/openclaw/run.sh'"]
    networks:
      - openclaw_lab
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  openclaw-governed:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../..:/workspace:ro
      - ../../../runs:/workspace/runs
    working_dir: /workspace
    command: ["bash", "-lc", "echo 'Populate governed lane command in pipelines/openclaw/run.sh'"]
    networks:
      - openclaw_lab
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  openclaw_lab:
    internal: true
