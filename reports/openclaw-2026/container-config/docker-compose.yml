services:
  openclaw-ungoverned:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../..:/workspace:ro
      - ../../../runs:/workspace/runs
      - /Users/davidahmann/Projects/agent-ecosystem/openclaw:/openclaw:ro
      - /Users/davidahmann/Projects/gait:/gait:ro
    working_dir: /workspace
    command:
      [
        "bash",
        "-lc",
        "/workspace/pipelines/openclaw/execute_lane.sh --lane ungoverned --run-id ${RUN_ID} --repo-root /workspace --workload ${OPENCLAW_WORKLOAD_MODE:-synthetic} --duration-sec ${LANE_DURATION_SEC:-600}"
      ]
    environment:
      - RUN_ID=${RUN_ID}
      - OPENCLAW_WORKLOAD_MODE=${OPENCLAW_WORKLOAD_MODE:-synthetic}
      - LANE_DURATION_SEC=${LANE_DURATION_SEC:-600}
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PATH=/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENCLAW_WORKLOAD_CMD=/workspace/pipelines/openclaw/live_workload.sh
      - OPENCLAW_REPO_PATH=/openclaw
      - GAIT_REPO_PATH=/gait
      - OPENCLAW_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENCLAW_MODEL_ID=${OPENCLAW_MODEL_ID:-llama3.2:latest}
      - OPENCLAW_SCENARIO_SET=${OPENCLAW_SCENARIO_SET:-core5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openclaw_lab
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 256
    mem_limit: 2g
    cpus: "2.0"

  openclaw-governed:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../..:/workspace:ro
      - ../../../runs:/workspace/runs
      - /Users/davidahmann/Projects/agent-ecosystem/openclaw:/openclaw:ro
      - /Users/davidahmann/Projects/gait:/gait:ro
    working_dir: /workspace
    command:
      [
        "bash",
        "-lc",
        "/workspace/pipelines/openclaw/execute_lane.sh --lane governed --run-id ${RUN_ID} --repo-root /workspace --workload ${OPENCLAW_WORKLOAD_MODE:-synthetic} --duration-sec ${LANE_DURATION_SEC:-600} --policy reports/openclaw-2026/container-config/gait-policies/openclaw-research-v1.yaml"
      ]
    environment:
      - RUN_ID=${RUN_ID}
      - OPENCLAW_WORKLOAD_MODE=${OPENCLAW_WORKLOAD_MODE:-synthetic}
      - LANE_DURATION_SEC=${LANE_DURATION_SEC:-600}
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PATH=/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENCLAW_WORKLOAD_CMD=/workspace/pipelines/openclaw/live_workload.sh
      - OPENCLAW_REPO_PATH=/openclaw
      - GAIT_REPO_PATH=/gait
      - OPENCLAW_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENCLAW_MODEL_ID=${OPENCLAW_MODEL_ID:-llama3.2:latest}
      - OPENCLAW_SCENARIO_SET=${OPENCLAW_SCENARIO_SET:-core5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openclaw_lab
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 256
    mem_limit: 2g
    cpus: "2.0"

networks:
  openclaw_lab:
    driver: bridge
