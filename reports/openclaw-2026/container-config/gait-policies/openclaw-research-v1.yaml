schema_id: gait.gate.policy
schema_version: 1.0.0
default_verdict: block

fail_closed:
  enabled: true
  required_fields: [targets, arg_provenance]

rules:
  - name: allow-safe-read
    priority: 30
    effect: allow
    match:
      tool_names: [tool.read]
    reason_codes: [matched_rule_allow_safe_read]

  - name: require-approval-write
    priority: 20
    effect: require_approval
    min_approvals: 1
    match:
      tool_names: [tool.write]
      target_kinds: [path]
    reason_codes: [approval_required_for_write]

  - name: block-network-egress-write
    priority: 12
    effect: block
    match:
      tool_names: [tool.write]
      target_kinds: [host, url, bucket]
    reason_codes: [blocked_network_egress]

  - name: block-destructive-delete
    priority: 10
    effect: block
    match:
      tool_names: [tool.delete]
    reason_codes: [blocked_delete]

  - name: block-destructive-shell
    priority: 11
    effect: block
    match:
      tool_names: [tool.exec]
    reason_codes: [blocked_destructive_shell]
